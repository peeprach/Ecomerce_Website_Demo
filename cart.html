<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="cart.css" />
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
          <img src="images/logo433.png" alt="DES403 Logo" class="logo-img">
          <span class="logo-text"> CSS MALL</span>
        </div>
        <ul class="nav-links">
          <li><a href="home.html" class="active">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="coupon.html">Coupon</a></li>
          <li class="dropdown">
            <a href="#" class="dropbtn">My account</a>
            <div class="dropdown-content">
              <a href="acc.html">My Profile</a>
              <a href="myshop.html">My Shop</a>
              <a href="login.html" id="logout-btn" class="logout-btn">Logout</a>
            </div>
          </li> 
          <li>
            <a href="cart.html">
              <img src="images/shopping-cart.png" alt="Cart" class="cart-icon">
              <span id="cart-count" class="cart-count-badge">0</span>
            </a>
          </li>
        </ul>
    </nav>

    <header class="hero-section">
        <div class="hero-content">
            <h1>Shopping Cart</h1>
            <p>Home &gt; Cart</p>
        </div>
    </header>

    <main>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Items will be dynamically inserted here -->
            </tbody>
        </table>

        <div class="cart-total">
            <p>Total: <span id="cart-total">CNY0</span></p>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </main>

    <footer>
        <p style="text-align: center;">© 2026 CSS Mall. &nbsp;&nbsp;&nbsp; All Rights Reserved.</p>
    </footer>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
        authDomain: "mini-ecom-39979.firebaseapp.com",
        projectId: "mini-ecom-39979",
        storageBucket: "mini-ecom-39979.firebasestorage.app",
        messagingSenderId: "43435045240",
        appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const cartItemsContainer = document.getElementById("cart-items");
    const cartTotalEl = document.getElementById("cart-total");
    let currentUser = null;

    // 🔄 load
    function renderCartItems() {
        if (!currentUser) {
            cartItemsContainer.innerHTML = `
                <tr><td colspan="5" style="text-align:center;">Please log in.</td></tr>
            `;
            cartTotalEl.textContent = "CNY0";
            return;
        }

        const cartRef = db.collection("carts").doc(currentUser.uid).collection("items");
        cartRef.get().then(cartSnapshot => {
            if (cartSnapshot.empty) {
                cartItemsContainer.innerHTML = `
                    <tr><td colspan="5" style="text-align:center;">Your cart is empty.</td></tr>
                `;
                cartTotalEl.textContent = "CNY0";
                return;
            }

            cartItemsContainer.innerHTML = "";
            let total = 0;
            const promises = [];

            cartSnapshot.forEach(docSnap => {
                const item = docSnap.data();
                const productId = item.productId || docSnap.id;

                const p = db.collection("products").doc(productId).get().then(productSnap => {
                    if (!productSnap.exists) return;

                    const product = productSnap.data();
                    const subtotal = product.price * item.quantity;
                    total += subtotal;

                    cartItemsContainer.innerHTML += `
                      <tr id="cart-row-${docSnap.id}">
                          <td>
                              <img src="${product.imageUrl || 'images/placeholder.jpg'}" alt="${product.name}" style="width:50px;height:50px;object-fit:cover;margin-right:10px;">
                              ${product.name}
                          </td>
                          <td>CNY${product.price}</td>
                          <td>
                              <button onclick="updateQuantity('${docSnap.id}', -1)">-</button>
                              <span id="qty-${docSnap.id}">${item.quantity}</span>
                              <button onclick="updateQuantity('${docSnap.id}', 1)">+</button>
                          </td>
                          <td id="subtotal-${docSnap.id}">CNY${subtotal}</td>
                          <td>
                              <button onclick="removeFromCart('${docSnap.id}')">Remove</button>
                          </td>
                      </tr>
                  `;
              });
              promises.push(p);
            });

            Promise.all(promises).then(() => {
                cartTotalEl.textContent = `CNY ${total}`;
            });
        });
    }
    function updateQuantity(itemDocId, change) {
        if (!currentUser) return alert("Please log in first.");

        const itemRef = db.collection("carts").doc(currentUser.uid).collection("items").doc(itemDocId);

        itemRef.get().then(doc => {
          if (!doc.exists) return;
          let newQty = doc.data().quantity + change;
          if (newQty < 1) newQty = 1; // อย่าให้ต่ำกว่า 1
          itemRef.update({ quantity: newQty }).then(() => {
            // อัปเดตแค่ DOM โดยไม่ต้องโหลดใหม่ทั้งหน้า
            document.getElementById(`qty-${itemDocId}`).textContent = newQty;

            const productId = doc.data().productId || itemDocId;
            db.collection("products").doc(productId).get().then(productSnap => {
                if (!productSnap.exists) return;
                const product = productSnap.data();
                document.getElementById(`subtotal-${itemDocId}`).textContent = `CNY${product.price * newQty}`;
                updateCartTotal(); // อัปเดต total
            });
          });
        });
      }
      function updateCartTotal() {
          const cartRef = db.collection("carts").doc(currentUser.uid).collection("items");
          cartRef.get().then(cartSnapshot => {
              let total = 0;
              const promises = [];

              cartSnapshot.forEach(docSnap => {
                  const item = docSnap.data();
                  const productId = item.productId || docSnap.id;
                  const p = db.collection("products").doc(productId).get().then(productSnap => {
                      if (!productSnap.exists) return;
                      const product = productSnap.data();
                      total += product.price * item.quantity;
                  });
                  promises.push(p);
              });

              Promise.all(promises).then(() => {
                  cartTotalEl.textContent = `CNY ${total}`;
              });
          });
        }

    async function removeFromCart(itemDocId) {
        if (!currentUser) return alert("Please log in first.");

        try {
            await db
                .collection("carts")
                .doc(currentUser.uid)
                .collection("items")
                .doc(itemDocId)
                .delete();

            renderCartItems();
        } catch (error) {
            alert(error.message);
        }
    }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        renderCartItems();
    });

    // 🚪 Logout
    document.getElementById("logout-btn").addEventListener("click", () => {
        auth.signOut().then(() => {
            window.location.href = "login.html";
        });
    });

    // 💳 Checkout
    document.querySelector(".checkout-btn").addEventListener("click", () => {
        if (!currentUser) {
            alert("Please log in first.");
            return;
        }
        window.location.href = "checkout.html";
    });

    const cartCountEl = document.getElementById("cart-count");
    //cart = real-time
    function listenToCartChanges() {
        if(!currentUser) return;

        db.collection("carts").doc(currentUser.uid)
          .collection("items")
          .onSnapshot(snapshot => {
            let totalQty = 0;
            snapshot.forEach(doc => totalQty += doc.data().quantity || 0);
            cartCountEl.innerText = totalQty;
        });
    }
      auth.onAuthStateChanged(user => {
      currentUser = user;
      listenToCartChanges(); 
  });
  </script>
</body>
</html>
