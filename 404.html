<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — CSS Mall</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #111827;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 56px 48px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      max-width: 460px;
      width: 100%;
    }
    .num {
      font-size: 96px;
      font-weight: 900;
      color: #f59e0b;
      line-height: 1;
      margin-bottom: 12px;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 14px;
      color: #6b7280;
      font-weight: 400;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn-home {
      display: inline-block;
      padding: 13px 32px;
      background: #f59e0b;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      transition: background .2s;
      margin: 0 6px 10px;
    }
    .btn-home:hover { background: #d97706; }
    .btn-shop {
      display: inline-block;
      padding: 13px 32px;
      background: transparent;
      color: #374151;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: background .2s;
      margin: 0 6px 10px;
    }
    .btn-shop:hover { background: #f3f4f6; }
    .logo {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      margin-top: 36px;
    }
    .logo span { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="num">404</div>
    <div class="title">Page Not Found</div>
    <p class="sub">The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
    <a href="home.html" class="btn-home">🏠 Go Home</a>
    <a href="shop.html" class="btn-shop">🛍️ Browse Shop</a>
    <div class="logo">CSS <span>Mall</span></div>
  </div>
</body>
</html>
