    <!-- Account Section -->

        <!-- Main Content -->
        <main class="main-content">
            <h2>Change Password</h2>
            <p class="profile-subtitle" id="user-email">Enter a new password for </p>
            <div class="password-form">
                <input type="password" id="new-password" placeholder="New Password" required>
                <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
                <div class="btn-row">
                    <button class="btn-confirm" onclick="changePassword()">Change Password</button>
                </div>
                <p id="status-msg" style="color:red; margin-top:10px;"></p>
            </div>
        </main>
    </div>
   
   <script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
        authDomain: "mini-ecom-39979.firebaseapp.com",
        projectId: "mini-ecom-39979",
        storageBucket: "mini-ecom-39979.firebasestorage.app",
        messagingSenderId: "43435045240",
        appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // แสดง email ของผู้ใช้อัตโนมัติ
    auth.onAuthStateChanged(user => {
        const emailElem = document.getElementById("user-email");
        const statusMsg = document.getElementById("status-msg");
        if(user){
            emailElem.textContent = `Enter a new password for ${user.email}`;
        } else {
            emailElem.textContent = "Please log in first!";
            statusMsg.textContent = "";
        }
    });

    // เปลี่ยน password
    function changePassword(){
        const user = auth.currentUser;
        const newPassword = document.getElementById("new-password").value;
        const confirmPassword = document.getElementById("confirm-password").value;
        const statusMsg = document.getElementById("status-msg");

        if(!user){
            statusMsg.textContent = "You must be logged in!";
            return;
        }

        if(newPassword.length < 6){
            statusMsg.textContent = "Password must be at least 6 characters.";
            return;
        }

        if(newPassword !== confirmPassword){
            statusMsg.textContent = "Passwords do not match!";
            return;
        }

        // Firebase update password
        user.updatePassword(newPassword)
        .then(()=>{
            statusMsg.style.color = "green";
            statusMsg.textContent = "Password changed successfully!";
            document.getElementById("new-password").value = "";
            document.getElementById("confirm-password").value = "";
        })
        .catch(error=>{
            statusMsg.style.color = "red";
            statusMsg.textContent = error.message;
        });
    }
    </script>
</body>
