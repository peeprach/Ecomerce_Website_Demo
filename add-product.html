<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Product</title>
    <link rel="stylesheet" href="add-product.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
</head>
<body>
  <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/logo433.png" alt="DES403 Logo" class="logo-img" />
            <span class="logo-text">CSS MALL</span>
        </div>
            <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="coupon.html">Coupon</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn">My Account</a>
                <div class="dropdown-content">
                    <a href="acc.html">My Profile</a>
                    <a href="myshop.html" class="active">My Shop</a>
                    <a href="#" id="logout-btn">Logout</a>
                </div>
            </li>
            <li>
                <a href="cart.html">
                <img src="images/shopping-cart.png" alt="Cart" class="cart-icon" />
                </a>
            </li>
        </ul>
    </nav>

    <!-- Product Form -->
    <main style="padding: 30px; max-width: 700px; margin: auto;">
        <h1>Add Product</h1>
        <form id="add-product-form">
            <h2>Product Information</h2>
            <label>Product Name</label><br>
            <input type="text" id="product-name" maxlength="120" required><br><br>

            <label>Product Short Description</label><br>
            <textarea id="product-description" maxlength="5000" required style="width: 100%; height: 80px;"></textarea><br><br>

        <hr><br>
            <h2>Product and Stock</h2>
            <label>Stock</label><br>
            <input type="number" id="stock" required><br><br>

            <label>Price</label><br>
            <input type="number" id="price" required><br><br>

            <label>Add Image</label><br>
            <input type="file" id="product-image" accept="image/*" required><br><br>

            <label>Category</label><br>
            <input type="text" id="category" required><br><br>

        <hr><br>
        <h2>Condition</h2>
            <label><input type="radio" name="condition" value="New" checked> New</label>
            <label><input type="radio" name="condition" value="Used"> Used</label><br><br>

            <label>Pre-order</label>
            <input type="checkbox" id="preorder-toggle"><br><br>

            <label>Shipping Fee</label><br>
            <input type="number" id="shipping-fee" required><br><br>

            <button type="submit">Add Product</button>
        </form>
    </main>

    <!-- Firebase Config and Script -->
    <script>
        const firebaseConfig = {
        apiKey: "AIzaSyCogse_Ke5U0xzdFoiQDv-85AzhMKnieCw",
        authDomain: "des400-d3feb.firebaseapp.com",
        projectId: "des400-d3feb",
        storageBucket: "des400-d3feb.appspot.com",
        messagingSenderId: "1063674569994",
        appId: "1:1063674569994:web:525070c6d1500d93a806f3",
        measurementId: "G-DW42H6ES0R"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();
    </script>

    <!-- Product Upload Logic -->
    <script>
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const user = auth.currentUser;
        if (!user) {
            alert("Please log in first.");
            return;
        }

        const name = document.getElementById('product-name').value.trim();
        const description = document.getElementById('product-description').value.trim();
        const stock = parseInt(document.getElementById('stock').value);
        const price = parseFloat(document.getElementById('price').value);
        const category = document.getElementById('category').value.trim();
        const condition = document.querySelector('input[name="condition"]:checked').value;
        const preorder = document.getElementById('preorder-toggle').checked;
        const shippingFee = parseFloat(document.getElementById('shipping-fee').value);
        const imageFile = document.getElementById('product-image').files[0];

        if (!imageFile) {
            alert("Please select an image.");
            return;
        }

        try {
            const imageRef = storage.ref(`products/${user.uid}/${Date.now()}_${imageFile.name}`);
            const snapshot = await imageRef.put(imageFile);
            const imageUrl = await snapshot.ref.getDownloadURL();

            await db.collection('products').add({
            name,
            description,
            stock,
            price,
            category,
            condition,
            preorder,
            shippingFee,
            imageUrl,
            sellerId: user.uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Product added successfully!");
            document.getElementById('add-product-form').reset();
        } catch (error) {
            console.error("Error uploading:", error);
            alert("Upload failed. Please try again.");
        }
        });
    </script>
</body>
</html>
