<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Page</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/signup.css">
  <!-- Firebase UMD Build -->
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <nav class="navbar">
    <a class="nav-logo" href="home.html">
      <img src="images/logo433.png" alt="CSS Mall" />
      <span class="nav-logo-text">CSS <span>Mall</span></span>
    </a>
  </nav>

  <!-- Sign Up Section -->
  <section class="signup-container">
    <div class="left-side">
      <img src="images/logo433.png" alt="CSS MALL Logo" class="large-logo">
      <h2>The best online shopping destinations.</h2>
    </div>

    <!-- Sign Up Section -->
    <div class="signup-form">
      <h2>Sign Up</h2>
      <form id="signup-form">
        <label for="name">Username</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
    
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
    
        <label for="phoneNumber">Phone Number</label>
        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" required>
    
        <label>Gender</label>
        <div class="gender-options">
          <input type="radio" id="male" name="gender" value="male" required>
          <label for="male">Male</label>
    
          <input type="radio" id="female" name="gender" value="female">
          <label for="female">Female</label>
    
          <input type="radio" id="other" name="gender" value="other">
          <label for="other">Other</label>
        </div>
    
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required>
    
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
    
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
    
        <button type="submit" class="btn-signup">Sign Up</button>
      </form>
      <p id="signup-message" style="color: red;"></p>
      <p>Have an account?<a href="login.html"> Log In</a></p>
    </div>
    
    <style>
      .gender-options {
        display: flex;
        gap: 15px;
        align-items: center;
      }
    </style>    
  </section>

  <!-- Firebase Configuration and Script -->
  <script>
  // ✅ Firebase NEW project
  const firebaseConfig = {
    apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
    authDomain: "mini-ecom-39979.firebaseapp.com",
    projectId: "mini-ecom-39979",
    storageBucket: "mini-ecom-39979.firebasestorage.app",
    messagingSenderId: "43435045240",
    appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  // Handle Sign-Up
  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phoneNumber = document.getElementById('phoneNumber').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const gender = document.querySelector('input[name="gender"]:checked')?.value;
    const dob = document.getElementById('dob').value;
    const signupMessage = document.getElementById('signup-message');

    signupMessage.innerText = "";
    signupMessage.style.color = "red";

    if (!username || !email || !phoneNumber || !gender || !dob) {
      signupMessage.innerText = "All fields are required!";
      return;
    }

    if (password.length < 6) {
      signupMessage.innerText = "Password must be at least 6 characters!";
      return;
    }

    if (password !== confirmPassword) {
      signupMessage.innerText = "Passwords do not match!";
      return;
    }

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;

      await db.collection("users").doc(user.uid).set({
        username,
        email,
        phoneNumber,
        gender,
        dob,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      signupMessage.style.color = "green";
      signupMessage.innerText = "Sign-up successful! Redirecting...";

      setTimeout(() => {
        window.location.href = "home.html";
      }, 2000);

    } catch (error) {
      signupMessage.innerText = error.message;
      console.error(error);
    }
  });
</script>
</body>
</html>
