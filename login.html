<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="login.css">
  <!-- Firebase UMD Build -->
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">
      <img src="images/logo433.png" alt="DES403 Logo" class="logo-img">
      <span class="logo-text"> CSS MALL</span>
    </div>
  </nav>

  <section class="login-container">
    <!-- Left Side (Logo) -->
    <div class="left-side">
      <img src="images/logo433.png" alt="CSS MALL Logo" class="large-logo">
      <h2>The best online shopping destinations.</h2>
    </div>

    <div class="login-form">
      <h2>Log in</h2>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <button type="submit" class="btn-login">LOG IN</button>
        <p>Don't have an account? <a href="signup.html"> Sign Up</a></p>
        <p style="margin-top:30px">Or, login with</p>
        
        <button type="button" class="btn-login-with-icon btn-google">
          <img src="images/google.png"> Sign in with Google
        </button>

        <button type="button" class="btn-login-with-icon btn-apple">
          <img src="images/apple.png"> Sign in with Apple
        </button>

        <button type="button" class="btn-login-with-icon btn-phone">
          <img src="images/phone.png"> Sign in with Phone
        </button>
        <p id="login-message"></p>
        <div id="recaptcha-container"></div>
      </form>
    </div>
  </section>

  <script>
  // ✅ Firebase NEW project
  const firebaseConfig = {
    apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
    authDomain: "mini-ecom-39979.firebaseapp.com",
    projectId: "mini-ecom-39979",
    storageBucket: "mini-ecom-39979.firebasestorage.app",
    messagingSenderId: "43435045240",
    appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ===== Email / Password Login =====
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const loginMessage = document.getElementById('login-message');

    loginMessage.innerText = "";

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        loginMessage.style.color = "green";
        loginMessage.innerText = "Login successful! Redirecting...";
        setTimeout(() => {
          window.location.href = "shop.html";
        }, 1500);
      })
      .catch((error) => {
        loginMessage.style.color = "red";
        loginMessage.innerText = error.message;
      });
  });

  // ===== Google Login =====
  document.querySelector('.btn-google').addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    
    auth.signInWithPopup(provider)
      .then(() => {
        window.location.href = "shop.html";
      })
      .catch((error) => {
        document.getElementById('login-message').innerText = error.message;
      });
  });

  // ===== Apple Login =====
  document.querySelector('.btn-apple').addEventListener('click', () => {
    const provider = new firebase.auth.OAuthProvider('apple.com');

    auth.signInWithPopup(provider)
      .then(() => {
        window.location.href = "shop.html";
      })
      .catch((error) => {
        document.getElementById('login-message').innerText = error.message;
      });
  });

  // ===== Phone Login =====
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
    'recaptcha-container',
    { size: 'invisible' }
  );

  document.querySelector('.btn-phone').addEventListener('click', () => {
    const phoneNumber = prompt("Enter phone number (e.g. +66812345678)");

    auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
      .then((confirmationResult) => {
        const otp = prompt("Enter OTP");
        return confirmationResult.confirm(otp);
      })
      .then(() => {
        window.location.href = "shop.html";
      })
      .catch((error) => {
        document.getElementById('login-message').innerText = error.message;
      });
  });
</script>
</body>
</html>
