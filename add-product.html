<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Add Product</title>
<link rel="stylesheet" href="add-product.css"/>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="logo">
      <img src="images/logo433.png" alt="DES403 Logo" class="logo-img" />
      <span class="logo-text">CSS MALL</span>
  </div>
  <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="coupon.html">Coupon</a></li>
      <li class="dropdown">
          <a href="#" class="dropbtn">My Account</a>
          <div class="dropdown-content">
              <a href="acc.html">My Profile</a>
              <a href="myshop.html" class="active">My Shop</a>
              <a href="#" id="logout-btn">Logout</a>
          </div>
      </li>
      <li>
          <a href="cart.html">
          <img src="images/shopping-cart.png" alt="Cart" class="cart-icon" />
          </a>
      </li>
  </ul>
</nav>

<main class="form-container">
  <h1>Add Product</h1>
  <form id="add-product-form" class="product-form">
    <div class="form-row">
      <label for="product-name">Name</label>
      <input type="text" id="product-name" required>
    </div>

    <div class="form-row">
      <label for="price">Price</label>
      <input type="number" id="price" step="0.01" placeholder="0.00" required>
    </div>

    <div class="form-row">
      <label for="product-description">Description</label>
      <textarea id="product-description" rows="3"></textarea>
    </div>

    <div class="form-row">
      <label for="image-url">Image URL</label>
      <input type="text" id="image-url" placeholder="https://example.com/image.jpg" required>
    </div>

    <div class="form-row full-width">
      <button type="submit">Add Product</button>
    </div>
  </form>
</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
  authDomain: "mini-ecom-39979.firebaseapp.com",
  projectId: "mini-ecom-39979",
  storageBucket: "mini-ecom-39979.firebasestorage.app",
  messagingSenderId: "43435045240",
  appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const form = document.getElementById("add-product-form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("product-name").value.trim();
    const price = parseFloat(document.getElementById("price").value);
    const description = document.getElementById("product-description").value.trim();
    const imageUrl = document.getElementById("image-url").value.trim();

    if (!name || !price || !imageUrl) {
      alert("Please fill all required fields");
      return;
    }

    const productData = {
      name,
      price,
      description,
      imageUrl,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
      await db.collection("users").doc(user.uid).collection("products").add(productData);
      alert("Product added successfully!");
      window.location.href = "viewshop.html"; 
    } catch (err) {
      console.error(err);
      alert("Failed to add product");
    }
  });

  // Logout
  document.getElementById("logout-btn").addEventListener("click", () => {
    auth.signOut().then(() => window.location.href = "login.html");
  });
});
</script>

</body>
</html>
