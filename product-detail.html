<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — CSS Mall</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/product-detail.css" />
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="nav-logo" href="home.html">
      <img src="images/logo433.png" alt="CSS Mall" />
      <span class="nav-logo-text">CSS <span>Mall</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="shop.html" class="active">Shop</a></li>
      <li><a href="coupon.html">Coupons</a></li>
      <li class="nav-dropdown">
        <span class="nav-dropdown-btn">My Account</span>
        <div class="nav-dropdown-menu">
          <a href="acc.html">My Profile</a>
          <a href="myshop.html">My Shop</a>
          <a href="wishlist.html">Wishlist</a>
          <a href="customer/my-purchase.html">My Orders</a>
          <a href="#" id="logout-btn" class="danger">Logout</a>
        </div>
      </li>
    </ul>
    <div class="nav-icons">
      <a href="wishlist.html" class="nav-icon-btn" title="Wishlist">♡</a>
      <a href="cart.html" class="nav-icon-btn">
        <img src="images/shopping-cart.png" alt="Cart" />
        <span class="nav-badge" id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="home.html">Home</a>
    <span class="bc-sep">›</span>
    <a href="shop.html">Shop</a>
    <span class="bc-sep">›</span>
    <span class="bc-current" id="bc-name">Loading…</span>
  </div>

  <!-- Product section (skeleton while loading) -->
  <div class="product-wrap" id="product-wrap">
    <div class="img-pane">
      <div class="main-image-wrap">
        <div class="skeleton" style="width:100%;height:100%;min-height:400px;border-radius:0;"></div>
      </div>
    </div>
    <div class="info-pane">
      <div class="skeleton" style="height:28px;width:75%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:16px;width:45%;margin-bottom:18px;"></div>
      <div class="skeleton" style="height:56px;margin-bottom:18px;border-radius:10px;"></div>
      <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:14px;width:85%;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:20px;"></div>
      <div class="skeleton" style="height:70px;border-radius:10px;margin-bottom:16px;"></div>
      <div class="skeleton" style="height:48px;border-radius:10px;"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-section" id="tabs-section">
    <div class="tabs-card">
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="desc">Description</button>
        <button class="tab-btn" data-tab="specs">Specifications</button>
        <button class="tab-btn" data-tab="reviews">Reviews</button>
      </div>
      <div class="tab-pane active" id="tab-desc">
        <div class="skeleton" style="height:16px;width:90%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:16px;width:75%;"></div>
      </div>
      <div class="tab-pane" id="tab-specs"></div>
      <div class="tab-pane" id="tab-reviews">
        <div class="reviews-empty">
          <div class="big-star">⭐</div>
          <p>No reviews yet. Be the first to review this product!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Related products -->
  <div class="related-section" id="related-section">
    <div class="related-header">
      <h2>You May Also Like</h2>
      <a href="shop.html">View all →</a>
    </div>
    <div class="related-grid" id="related-grid">
      <div class="skeleton" style="height:260px;border-radius:16px;"></div>
      <div class="skeleton" style="height:260px;border-radius:16px;"></div>
      <div class="skeleton" style="height:260px;border-radius:16px;"></div>
      <div class="skeleton" style="height:260px;border-radius:16px;"></div>
    </div>
  </div>

  <div class="page-footer">© 2026 CSS Mall. All Rights Reserved.</div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Firebase ──────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
      authDomain: "mini-ecom-39979.firebaseapp.com",
      projectId: "mini-ecom-39979",
      storageBucket: "mini-ecom-39979.firebasestorage.app",
      messagingSenderId: "43435045240",
      appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
    };
    firebase.initializeApp(firebaseConfig);
    const db   = firebase.firestore();
    const auth = firebase.auth();

    // ── Toast ─────────────────────────────────────────────────────
    function showToast(msg, duration = 2500) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.style.display = "flex";
      clearTimeout(t._t); t._t = setTimeout(() => { t.style.display = "none"; }, duration);
    }

    // ── State ─────────────────────────────────────────────────────
    const productId = new URLSearchParams(location.search).get("id");
    if (!productId) window.location.href = "shop.html";

    let currentUser = null;
    let productStock = null;
    let isWishlisted = false;

    // ── Auth ──────────────────────────────────────────────────────
    auth.onAuthStateChanged(async user => {
      document.getElementById("logout-btn").onclick = e => {
        e.preventDefault(); auth.signOut().then(() => window.location.href = "login.html");
      };
      currentUser = user;
      if (user) {
        db.collection("carts").doc(user.uid).collection("items")
          .onSnapshot(snap => {
            let t = 0; snap.forEach(d => t += d.data().quantity || 0);
            document.getElementById("cart-count").textContent = t;
          });
        // Check wishlist state
        const wSnap = await db.collection("users").doc(user.uid)
          .collection("wishlist").doc(productId).get().catch(() => null);
        if (wSnap && wSnap.exists) {
          isWishlisted = true;
          updateWishBtn();
        }
      }
    });

    // ── Stars ─────────────────────────────────────────────────────
    function renderStars(r) {
      const full = Math.floor(r);
      let s = "★".repeat(full) + (r - full >= .5 ? "★" : "") + "☆".repeat(5 - Math.ceil(r));
      return s.slice(0, 5);
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

    // ── Load product ──────────────────────────────────────────────
    async function loadProduct() {
      let snap;
      try { snap = await db.collection("products").doc(productId).get(); }
      catch(e) {
        document.getElementById("product-wrap").innerHTML =
          `<div style="padding:60px;text-align:center;color:var(--red);">Failed to load product.</div>`;
        return;
      }
      if (!snap.exists) {
        document.getElementById("product-wrap").innerHTML =
          `<div style="padding:60px;text-align:center;color:var(--muted);">
            Product not found. <a href="shop.html" style="color:var(--brand-dark);">Back to Shop</a></div>`;
        return;
      }

      const p = { id: snap.id, ...snap.data() };
      document.title = `${p.name} — CSS Mall`;
      document.getElementById("bc-name").textContent = p.name;

      productStock = typeof p.stock === "number" ? p.stock : null;
      const maxQty = productStock || 999;

      const stockHTML = productStock !== null
        ? (productStock > 0
          ? `<span class="in-stock">✔ ${productStock} in stock</span>`
          : `<span class="out-stock">✖ Out of stock</span>`)
        : `<span class="in-stock">✔ In Stock</span>`;

      const rating      = typeof p.rating      === "number" ? p.rating      : 4.5;
      const reviewCount = typeof p.reviewCount === "number" ? p.reviewCount : 0;
      const soldCount   = typeof p.sales       === "number" ? p.sales       : 0;

      // Fetch seller name
      let shopName = "CSS Mall Seller";
      if (p.sellerId) {
        try {
          const u = await db.collection("users").doc(p.sellerId).get();
          if (u.exists) shopName = u.data().username || shopName;
        } catch(_) {}
      }
      const shopLink   = p.sellerId ? `viewshop.html?uid=${p.sellerId}` : "shop.html";
      const shopInitial = shopName.charAt(0).toUpperCase();

      // ── Render product section
      document.getElementById("product-wrap").innerHTML = `
        <!-- Image pane -->
        <div class="img-pane">
          <div class="main-image-wrap">
            <img id="main-img"
              src="${p.imageUrl || 'images/placeholder.jpg'}"
              alt="${p.name}" />
          </div>
        </div>

        <!-- Info pane -->
        <div class="info-pane">
          <h1 class="product-title">${p.name}</h1>

          <div class="rating-row">
            <span class="stars">${renderStars(rating)}</span>
            <span class="rating-num">${rating.toFixed(1)}</span>
            <span class="rating-sep">|</span>
            <span class="rating-meta">${reviewCount} Reviews</span>
            <span class="rating-sep">|</span>
            <span class="rating-meta">${soldCount} Sold</span>
          </div>

          <div class="price-section">
            <span class="price-tag">$${Number(p.price).toFixed(2)}</span>
            <span class="price-shipping">Free shipping on 2+ items</span>
          </div>

          <p class="short-desc">${p.shortDesc || p.description || 'No description available.'}</p>

          <div class="meta-grid">
            <div class="meta-item">
              <span class="meta-icon">📦</span>
              <div><span class="meta-label">Stock</span><span class="meta-value">${stockHTML}</span></div>
            </div>
            <div class="meta-item">
              <span class="meta-icon">🏷️</span>
              <div><span class="meta-label">Category</span><span class="meta-value">${p.category ? capitalize(p.category) : "General"}</span></div>
            </div>
            <div class="meta-item">
              <span class="meta-icon">🚚</span>
              <div><span class="meta-label">Shipping</span><span class="meta-value">$9 · Free ≥2 items</span></div>
            </div>
            <div class="meta-item">
              <span class="meta-icon">🏅</span>
              <div><span class="meta-label">Brand</span><span class="meta-value">${p.brand && p.brand !== "no-brand" ? capitalize(p.brand) : "N/A"}</span></div>
            </div>
            <div class="meta-item">
              <span class="meta-icon">🔧</span>
              <div><span class="meta-label">Condition</span><span class="meta-value">${capitalize(p.condition || "new")}</span></div>
            </div>
            <div class="meta-item">
              <span class="meta-icon">✅</span>
              <div><span class="meta-label">Verified</span><span class="meta-value">${p.verify === "yes" ? "✔ Yes" : "No"}</span></div>
            </div>
          </div>

          <a href="${shopLink}" class="shop-card">
            <div class="shop-avatar">${shopInitial}</div>
            <div class="shop-card-info">
              <div class="shop-card-name">${shopName}</div>
              <div class="shop-card-sub">Visit Shop to see all products</div>
            </div>
            <span class="shop-card-arrow">›</span>
          </a>

          <div class="qty-row">
            <span class="qty-label">Quantity</span>
            <div class="qty-ctrl">
              <button id="qty-minus">−</button>
              <input type="number" id="qty-input" value="1" min="1" max="${maxQty}" />
              <button id="qty-plus">+</button>
            </div>
            ${productStock !== null ? `<span class="stock-hint">${productStock} available</span>` : ""}
          </div>

          <div class="action-row">
            <button class="btn-add-cart" id="btn-add-cart">🛒 Add to Cart</button>
            <button class="btn-buy-now"  id="btn-buy-now">⚡ Buy Now</button>
            <button class="btn-wishlist" id="btn-wishlist">♡ Save to Wishlist</button>
          </div>
        </div>
      `;

      // ── Qty controls
      const qtyInput = document.getElementById("qty-input");
      document.getElementById("qty-minus").onclick = () => {
        const v = parseInt(qtyInput.value);
        if (v > 1) qtyInput.value = v - 1;
      };
      document.getElementById("qty-plus").onclick = () => {
        const v = parseInt(qtyInput.value);
        if (v < maxQty) qtyInput.value = v + 1;
      };
      qtyInput.oninput = () => {
        let v = parseInt(qtyInput.value) || 1;
        qtyInput.value = Math.min(maxQty, Math.max(1, v));
      };

      // ── Button handlers
      document.getElementById("btn-add-cart").onclick  = () => addToCart(false);
      document.getElementById("btn-buy-now").onclick   = () => addToCart(true);
      document.getElementById("btn-wishlist").onclick  = toggleWishlist;

      // Restore wishlist state if already set before product loaded
      updateWishBtn();

      // ── Tabs
      document.getElementById("tab-desc").innerHTML =
        `<div style="white-space:pre-wrap;font-weight:400;">${p.detail || p.description || p.shortDesc || "No detailed description available."}</div>`;
      document.getElementById("tab-specs").innerHTML = buildSpecsTable(p);

      loadRelated(p.category, p.id);
    }

    // ── Wishlist ──────────────────────────────────────────────────
    function updateWishBtn() {
      const btn = document.getElementById("btn-wishlist");
      if (!btn) return;
      if (isWishlisted) {
        btn.textContent = "♥ Saved to Wishlist";
        btn.classList.add("saved");
        btn.style.color = "var(--red)";
      } else {
        btn.textContent = "♡ Save to Wishlist";
        btn.classList.remove("saved");
        btn.style.color = "";
      }
    }

    async function toggleWishlist() {
      if (!currentUser) { showToast("Please log in first."); return; }
      const ref = db.collection("users").doc(currentUser.uid)
        .collection("wishlist").doc(productId);
      if (isWishlisted) {
        await ref.delete();
        isWishlisted = false;
        showToast("Removed from wishlist");
      } else {
        const ps = await db.collection("products").doc(productId).get();
        if (ps.exists) await ref.set({ ...ps.data(), savedAt: firebase.firestore.FieldValue.serverTimestamp() });
        isWishlisted = true;
        showToast("Saved to wishlist ♥");
      }
      updateWishBtn();
    }

    // ── Add to cart ───────────────────────────────────────────────
    async function addToCart(goToCart) {
      if (!currentUser) { showToast("Please log in first."); return; }
      const qty = parseInt(document.getElementById("qty-input").value) || 1;
      const ref = db.collection("carts").doc(currentUser.uid)
        .collection("items").doc(productId);
      try {
        const doc = await ref.get();
        if (doc.exists) await ref.update({ quantity: doc.data().quantity + qty });
        else            await ref.set({ quantity: qty });
        if (goToCart) window.location.href = "cart.html";
        else showToast(`Added ${qty} item${qty > 1 ? "s" : ""} to cart! 🛒`);
      } catch(e) { showToast("Error: " + e.message); }
    }

    // ── Specs table ───────────────────────────────────────────────
    function buildSpecsTable(p) {
      const rows = [
        ["Name",      p.name],
        ["Category",  p.category ? capitalize(p.category) : null],
        ["Brand",     p.brand && p.brand !== "no-brand" ? capitalize(p.brand) : null],
        ["Condition", capitalize(p.condition || "new")],
        ["SKU",       p.sku || null],
        ["Price",     `$${Number(p.price).toFixed(2)}`],
        ["Stock",     productStock !== null ? `${productStock} units` : null],
        ["Shipping",  "Free on 2+ items / $9"],
        ["Verified",  p.verify === "yes" ? "Yes" : "No"],
        ["Tags",      p.tags || null],
      ].filter(r => r[1]);

      return `<table class="spec-table">
        ${rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}
      </table>`;
    }

    // ── Related products ──────────────────────────────────────────
    async function loadRelated(category, excludeId) {
      const grid = document.getElementById("related-grid");
      try {
        let snap;
        if (category) {
          snap = await db.collection("products").where("category", "==", category).limit(6).get();
        }
        if (!snap || snap.empty) {
          snap = await db.collection("products").orderBy("name").limit(6).get();
        }
        const products = snap.docs
          .filter(d => d.id !== excludeId)
          .slice(0, 4)
          .map(d => ({ id: d.id, ...d.data() }));

        if (products.length === 0) {
          document.getElementById("related-section").style.display = "none";
          return;
        }
        grid.innerHTML = "";
        products.forEach(p => {
          const card = document.createElement("div");
          card.className = "product-card";
          card.style.cursor = "pointer";
          card.innerHTML = `
            <div class="product-card-img">
              <img src="${p.imageUrl || 'images/placeholder.jpg'}" alt="${p.name}" loading="lazy" />
            </div>
            <div class="product-card-body">
              <div class="product-card-name">${p.name}</div>
              <div class="product-card-desc">${p.shortDesc || p.description || ""}</div>
              <div class="product-card-price">$${Number(p.price).toFixed(2)}</div>
              <div class="product-card-actions">
                <button class="btn-add-to-cart" onclick="event.stopPropagation();relatedAddCart('${p.id}')">Cart</button>
                <button class="btn-buy-now-card" onclick="event.stopPropagation();window.location.href='product-detail.html?id=${p.id}'">Buy Now</button>
              </div>
            </div>`;
          card.onclick = () => window.location.href = `product-detail.html?id=${p.id}`;
          grid.appendChild(card);
        });
      } catch(_) {
        document.getElementById("related-section").style.display = "none";
      }
    }

    function relatedAddCart(pid) {
      if (!currentUser) { showToast("Please log in first."); return; }
      const ref = db.collection("carts").doc(currentUser.uid).collection("items").doc(pid);
      ref.get().then(d => d.exists ? ref.update({ quantity: d.data().quantity + 1 }) : ref.set({ quantity: 1 }))
        .then(() => showToast("Added to cart! 🛒"));
    }

    // ── Tab switching ─────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      });
    });

    loadProduct();
  </script>
</body>
</html>
