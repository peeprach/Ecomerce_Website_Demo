<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout</title>
  <link rel="stylesheet" href="checkout.css" />
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo">
      <img src="../images/logo433.png" alt="DES403 Logo" class="logo-img" />
      <span class="logo-text">CSS MALL</span>
    </div>
    <ul class="nav-links">
      <li><a href="../home.html">Home</a></li>
      <li><a href="../shop.html">Shop</a></li>
      <li><a href="../coupon.html">Coupon</a></li>
      <li class="dropdown">
        <a href="#" class="dropbtn">My account</a>
        <div class="dropdown-content">
          <a href="../acc.html">My Profile</a>
          <a href="../myshop.html">My Shop</a>
          <a href="../login.html" id="logout-btn" class="logout-btn">Logout</a>
        </div>
      </li>
      <li>
        <a href="../cart.html">
          <img src="../images/shopping-cart.png" alt="Cart" class="cart-icon" />
          <span id="cart-count" class="cart-count-badge">0</span>
        </a>
      </li>
    </ul>
  </nav>

  <main>
    <h1 style="margin-left: 20vh;">Checkout</h1>

    <!-- Delivery Address -->
    <section id="delivery-address" class="box">
      <h2>📍 Delivery Address</h2>
      <div id="address-container">
        <p style="color: gray;">Loading address...</p>
      </div>
    </section>

    <div id="address-popup" class="popup" style="display:none;">
      <div class="popup-content">
        <h2>New Address</h2>

        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" placeholder="Full Name" />

        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="Phone Number" />

        <label for="location">Province, District, Sub District, Postal Code</label>
        <input type="text" id="location" placeholder="Province, District, Sub District, Postal Code" />

        <label for="street">Street Name, Building, House No.</label>
        <input type="text" id="street" placeholder="Street Name, Building, House No." />

        <div class="popup-actions" style="display: flex; gap: 50px; margin-top: 20px;">
          <button id="close-popup">Cancel</button>
          <button id="save-address" class="submit-btn">Submit</button>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <section id="order-summary" class="box">
      <h2>📦 Products Ordered</h2>
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
          </tr>
        </thead>
        <tbody id="order-items">
          <tr><td colspan="4" style="color: gray; text-align: center;">Loading order items...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- Payment Method -->
    <section id="payment-method" class="box">
      <h2>💳 Payment Method</h2>
      <label><input type="radio" name="payment" value="cod" /> Cash on Delivery</label>
      <label><input type="radio" name="payment" value="qr" /> QR Code</label>
      <label><input type="radio" name="payment" value="credit" /> Credit Card</label>
    </section>

    <!-- Order Total -->
    <section id="order-total" class="box">
      <p>Shipping: CNY 0</p>
      <h3>
        Order Total: <span class="total-price">CNY 0</span>
      </h3>
      <button id="place-order">Place Order</button>
    </section>
  </main>

<script>
const shippingOneItem = 9;
const shippingFreeThreshold = 2;

const addressContainer = document.getElementById("address-container");
const orderItemsContainer = document.getElementById("order-items");
const totalPriceElement = document.querySelector(".total-price");
const cartCountEl = document.getElementById("cart-count");

let selectedAddress = null;

const firebaseConfig = {
  apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
  authDomain: "mini-ecom-39979.firebaseapp.com",
  projectId: "mini-ecom-39979",
  storageBucket: "mini-ecom-39979.firebasestorage.app",
  messagingSenderId: "43435045240",
  appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// === Address Popup ===
document.getElementById("close-popup").onclick = ()=>document.getElementById("address-popup").style.display="none";

document.getElementById("save-address").onclick = async ()=>{
  const user = auth.currentUser;
  if(!user) { alert("Please login"); return; }

  const fullName = document.getElementById("full-name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const location = document.getElementById("location").value.trim();
  const street = document.getElementById("street").value.trim();

  if(!fullName || !phone || !location || !street){ alert("Please fill all fields"); return; }

  const fullAddress = `${location}, ${street}`;
  await db.collection("users").doc(user.uid).collection("addresses").add({
    fullName,
    phoneno: phone,
    detail: fullAddress,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("address-popup").style.display = "none";
  alert("Address saved!");
  loadUserAddresses();
};

// === Load addresses ===
async function loadUserAddresses() {
  const user = auth.currentUser;
  if(!user) return;

  const addressesRef = db.collection("users").doc(user.uid).collection("addresses");
  const snapshot = await addressesRef.orderBy("createdAt","desc").get();

  addressContainer.innerHTML = "";
  if(!snapshot.empty){
    addressContainer.innerHTML = `<p><strong>Select delivery address:</strong></p>`;
    snapshot.docs.forEach(doc=>{
      const data = doc.data();
      const btn = document.createElement("button");
      btn.textContent = `${data.fullname} | ${data.phoneno} | ${data.detail}`;
      btn.style.display="block";
      btn.style.margin="5px 0";
      btn.onclick = ()=>{
        selectedAddress = {id: doc.id, ...data};
        Array.from(addressContainer.querySelectorAll("button")).forEach(b=>b.style.backgroundColor="");
        btn.style.backgroundColor="#cfc";
      };
      addressContainer.appendChild(btn);
    });

    const addBtn = document.createElement("button");
    addBtn.textContent = "+ Add address";
    addBtn.onclick = ()=>document.getElementById("address-popup").style.display="block";
    addBtn.style.display="block";
    addBtn.style.marginTop="10px";
    addressContainer.appendChild(addBtn);
  } else {
    addressContainer.innerHTML = `<button onclick="document.getElementById('address-popup').style.display='block'">+ Add address</button>`;
  }
}

// === Load cart items ===
async function loadCartItems(user){
  const cartRef = db.collection("carts").doc(user.uid).collection("items");
  cartRef.onSnapshot(async snapshot => {
    orderItemsContainer.innerHTML = "";
    if(snapshot.empty){
      orderItemsContainer.innerHTML = `<tr><td colspan="4" style="text-align:center;">Your cart is empty.</td></tr>`;
      totalPriceElement.textContent = `CNY 0`;
      cartCountEl.innerText = 0;
      return;
    }

    let totalQuantity = 0;
    let subtotalAll = 0;

    const promises = [];
    snapshot.forEach(doc=>{
      const item = doc.data();
      totalQuantity += item.quantity;
      const p = db.collection("products").doc(doc.id).get().then(productSnap=>{
        if(!productSnap.exists) return;
        const product = productSnap.data();
        const subtotal = product.price*item.quantity;
        subtotalAll += subtotal;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><img src="${product.imageUrl||'images/placeholder.jpg'}" style="width:50px;margin-right:10px;vertical-align:middle;">${product.name}</td>
          <td>CNY ${product.price}</td>
          <td>
            <button class="minus">-</button>
            <span class="qty">${item.quantity}</span>
            <button class="plus">+</button>
          </td>
          <td class="subtotal">CNY ${subtotal}</td>
        `;
        orderItemsContainer.appendChild(tr);

        // +/- buttons
        const qtySpan = tr.querySelector(".qty");
        const subtotalTd = tr.querySelector(".subtotal");

        tr.querySelector(".minus").onclick = async ()=>{
          if(item.quantity>1){
            item.quantity--;
            qtySpan.textContent=item.quantity;
            subtotalTd.textContent=`CNY ${product.price*item.quantity}`;
            await cartRef.doc(doc.id).update({quantity:item.quantity});
          }
        };

        tr.querySelector(".plus").onclick = async ()=>{
          item.quantity++;
          qtySpan.textContent=item.quantity;
          subtotalTd.textContent=`CNY ${product.price*item.quantity}`;
          await cartRef.doc(doc.id).update({quantity:item.quantity});
        };
      });
      promises.push(p);
    });

    await Promise.all(promises);

    // Shipping
    let shipping = totalQuantity>shippingFreeThreshold?0:shippingOneItem;
    totalPriceElement.textContent = `CNY ${subtotalAll+shipping}`;
    document.getElementById("order-total").querySelector("p").textContent = `Shipping: ${shipping===0?'Free':'CNY '+shipping}`;
    cartCountEl.innerText = totalQuantity;
  });
}

// === Auth listener ===
auth.onAuthStateChanged(user=>{
  const logoutBtn = document.getElementById("logout-btn");
  if(logoutBtn) logoutBtn.onclick = ()=>auth.signOut().then(()=>window.location.href="../login.html");

  if(!user){
    addressContainer.innerHTML = `<p style="color:gray;">Please log in.</p>`;
    orderItemsContainer.innerHTML = `<tr><td colspan="4" style="text-align:center;">Please login to view your cart.</td></tr>`;
    totalPriceElement.textContent = `CNY 0`;
    cartCountEl.innerText = 0;
    return;
  }

  loadUserAddresses();
  loadCartItems(user);

  document.querySelector('input[name="payment"][value="cod"]').checked = true;
});

// === Place order ===
document.getElementById("place-order").onclick = async ()=>{
  const user = auth.currentUser;
  if(!user){ alert("Please log in"); return; }
  if(!selectedAddress){ alert("Please select a delivery address"); return; }

  const payment = document.querySelector('input[name="payment"]:checked').value;
  const cartRef = db.collection("carts").doc(user.uid).collection("items");
  const cartSnap = await cartRef.get();
  if(cartSnap.empty){ alert("Cart is empty"); return; }

  let items = [];
  let subtotalAll = 0;

  for (const doc of cartSnap.docs) {
    const cartItem = doc.data();
    const productSnap = await db.collection("products").doc(doc.id).get();
    if (!productSnap.exists) continue;

    const product = productSnap.data();
    const subtotal = product.price * cartItem.quantity;

    items.push({
      productId: doc.id,
      name: product.name,
      price: product.price,
      imageUrl: product.imageUrl || "",
      quantity: cartItem.quantity,
      subtotal
    });

    subtotalAll += subtotal;
  }


  let shipping = items.length>shippingFreeThreshold?0:shippingOneItem;
  const orderTotal = subtotalAll+shipping;

  const orderRef = await db.collection("orders").add({
    userId: user.uid,
    items,
    address: selectedAddress,
    payment,
    shipping,
    total: orderTotal,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  // clear cart
  const batch = db.batch();
  cartSnap.forEach(doc => batch.delete(doc.ref));
  await batch.commit();

  // 👉 ไปหน้า success
  window.location.href = `order-success.html?orderId=${orderRef.id}`;
};
</script>
</body>
</html>
