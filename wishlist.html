<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wishlist — CSS Mall</title>
  <link rel="stylesheet" href="css/global.css" />
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
  <style>
    /* ── Hero ── */
    .wishlist-hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 48px 48px 40px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .wishlist-hero::before {
      content: '♥';
      position: absolute;
      font-size: 280px;
      opacity: .04;
      right: 40px; top: -40px;
      line-height: 1;
      pointer-events: none;
    }
    .wishlist-hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
    .wishlist-hero p  { font-size: 14px; color: rgba(255,255,255,.6); font-weight: 400; }

    /* ── Count bar ── */
    .wishlist-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 48px;
      background: var(--white);
      border-bottom: 1px solid #f0f0f0;
    }
    .wishlist-bar span { font-size: 14px; color: var(--gray); font-weight: 500; }
    .clear-all-btn {
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: background .2s;
    }
    .clear-all-btn:hover { background: #fef2f2; }

    /* ── Grid ── */
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
      max-width: 1400px;
      margin: 32px auto;
      padding: 0 48px;
    }

    /* Remove btn on card */
    .card-remove-btn {
      position: absolute;
      top: 10px; right: 10px;
      width: 34px; height: 34px;
      background: rgba(255,255,255,.95);
      border: none;
      border-radius: 50%;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      color: var(--red);
      transition: background .2s, transform .2s;
      z-index: 2;
    }
    .card-remove-btn:hover { background: #fef2f2; transform: scale(1.1); }

    /* ── Empty state ── */
    .wishlist-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }
    .wishlist-empty .empty-big { font-size: 72px; margin-bottom: 20px; }
    .wishlist-empty h2 { font-size: 22px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
    .wishlist-empty p  { font-size: 15px; color: var(--gray); font-weight: 400; margin-bottom: 28px; }

    /* ── Footer ── */
    .page-footer { background: var(--dark); color: #9ca3af; text-align: center; padding: 20px; font-size: 13px; }

    @media (max-width: 1200px) { .wishlist-grid { grid-template-columns: repeat(4,1fr); } }
    @media (max-width: 900px)  { .wishlist-grid { grid-template-columns: repeat(3,1fr); padding: 0 24px; } .wishlist-bar { padding: 14px 24px; } .wishlist-hero { padding: 36px 24px; } }
    @media (max-width: 600px)  { .wishlist-grid { grid-template-columns: repeat(2,1fr); gap:12px; padding: 0 16px; } }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="nav-logo" href="home.html">
      <img src="images/logo433.png" alt="CSS Mall" />
      <span class="nav-logo-text">CSS <span>Mall</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="coupon.html">Coupons</a></li>
      <li class="nav-dropdown">
        <span class="nav-dropdown-btn">My Account</span>
        <div class="nav-dropdown-menu">
          <a href="acc.html">My Profile</a>
          <a href="myshop.html">My Shop</a>
          <a href="wishlist.html">Wishlist</a>
          <a href="#" id="logout-btn" class="danger">Logout</a>
        </div>
      </li>
    </ul>
    <div class="nav-icons">
      <a href="wishlist.html" class="nav-icon-btn" title="Wishlist" style="color:var(--red);">♥</a>
      <a href="cart.html" class="nav-icon-btn" title="Cart">
        <img src="images/shopping-cart.png" alt="Cart" />
        <span class="nav-badge" id="cart-count">0</span>
      </a>
    </div>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
  </nav>

  <!-- Hero -->
  <div class="wishlist-hero">
    <h1>My Wishlist</h1>
    <p>Products you've saved — add them to cart whenever you're ready.</p>
  </div>

  <!-- Count bar -->
  <div class="wishlist-bar">
    <span id="wishlist-count">Loading…</span>
    <button class="clear-all-btn" id="clear-all-btn" style="display:none;">Clear All</button>
  </div>

  <!-- Grid -->
  <div class="wishlist-grid" id="wishlist-grid">
    <!-- loaded by JS -->
  </div>

  <div class="page-footer">© 2026 CSS Mall. All Rights Reserved.</div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, duration = 2500) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.style.display = "flex";
      clearTimeout(t._t); t._t = setTimeout(() => { t.style.display = "none"; }, duration);
    }

    const firebaseConfig = {
      apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
      authDomain: "mini-ecom-39979.firebaseapp.com",
      projectId: "mini-ecom-39979",
      storageBucket: "mini-ecom-39979.firebasestorage.app",
      messagingSenderId: "43435045240",
      appId: "1:43435045240:web:ba425c522e37b4c1a7d88d"
    };
    firebase.initializeApp(firebaseConfig);
    const db   = firebase.firestore();
    const auth = firebase.auth();

    let currentUser = null;
    const grid         = document.getElementById("wishlist-grid");
    const countEl      = document.getElementById("wishlist-count");
    const clearBtn     = document.getElementById("clear-all-btn");
    const cartCountEl  = document.getElementById("cart-count");

    auth.onAuthStateChanged(user => {
      document.getElementById("logout-btn").onclick = e => {
        e.preventDefault(); auth.signOut().then(() => window.location.href = "login.html");
      };
      if (user) {
        currentUser = user;
        listenCart();
        loadWishlist();
      } else {
        grid.innerHTML = `
          <div class="wishlist-empty">
            <div class="empty-big">🔐</div>
            <h2>Sign in to see your wishlist</h2>
            <p>Save products you love and come back to them anytime.</p>
            <a href="login.html" class="btn btn-primary btn-lg">Log In</a>
          </div>`;
        countEl.textContent = "";
      }
    });

    function listenCart() {
      db.collection("carts").doc(currentUser.uid).collection("items")
        .onSnapshot(snap => {
          let t = 0; snap.forEach(d => t += d.data().quantity || 0);
          cartCountEl.textContent = t;
        });
    }

    function loadWishlist() {
      db.collection("users").doc(currentUser.uid).collection("wishlist")
        .orderBy("savedAt", "desc")
        .onSnapshot(snap => {
          grid.innerHTML = "";
          const count = snap.size;
          countEl.textContent = count === 0 ? "Your wishlist is empty" : `${count} saved item${count !== 1 ? "s" : ""}`;
          clearBtn.style.display = count > 0 ? "block" : "none";

          if (snap.empty) {
            grid.innerHTML = `
              <div class="wishlist-empty">
                <div class="empty-big">♡</div>
                <h2>Nothing saved yet</h2>
                <p>Browse the shop and tap the heart icon to save products here.</p>
                <a href="shop.html" class="btn btn-primary btn-lg">Start Shopping</a>
              </div>`;
            return;
          }

          snap.forEach(doc => {
            const p = { id: doc.id, ...doc.data() };
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
              <div class="product-card-img">
                <a href="product-detail.html?id=${p.id}">
                  <img src="${p.imageUrl || 'images/placeholder.jpg'}" alt="${p.name}" loading="lazy" />
                </a>
                <button class="card-remove-btn" title="Remove from wishlist">♥</button>
              </div>
              <div class="product-card-body">
                <a href="product-detail.html?id=${p.id}">
                  <div class="product-card-name">${p.name}</div>
                </a>
                <div class="product-card-desc">${p.shortDesc || p.description || ''}</div>
                <div class="product-card-price">$${Number(p.price).toFixed(2)}</div>
                <div class="product-card-actions">
                  <button class="btn-add-to-cart" onclick="addToCart('${p.id}')">Add to Cart</button>
                  <button class="btn-buy-now-card" onclick="buyNow('${p.id}')">Buy Now</button>
                </div>
              </div>
            `;
            card.querySelector(".card-remove-btn").onclick = () => removeItem(p.id, card);
            grid.appendChild(card);
          });
        });
    }

    async function removeItem(productId, cardEl) {
      cardEl.style.opacity = "0.4";
      cardEl.style.pointerEvents = "none";
      await db.collection("users").doc(currentUser.uid).collection("wishlist").doc(productId).delete();
      showToast("Removed from wishlist");
    }

    clearBtn.onclick = async () => {
      if (!confirm("Remove all items from your wishlist?")) return;
      clearBtn.textContent = "Clearing…"; clearBtn.disabled = true;
      const snap = await db.collection("users").doc(currentUser.uid).collection("wishlist").get();
      const batch = db.batch();
      snap.forEach(d => batch.delete(d.ref));
      await batch.commit();
      showToast("Wishlist cleared");
      clearBtn.textContent = "Clear All"; clearBtn.disabled = false;
    };

    function addToCart(productId) {
      if (!currentUser) { showToast("Please log in first."); return; }
      const ref = db.collection("carts").doc(currentUser.uid).collection("items").doc(productId);
      ref.get().then(d => d.exists ? ref.update({ quantity: d.data().quantity + 1 }) : ref.set({ quantity: 1 }))
        .then(() => showToast("Added to cart! 🛒"))
        .catch(e => showToast(e.message));
    }

    function buyNow(productId) {
      if (!currentUser) { showToast("Please log in first."); return; }
      const ref = db.collection("carts").doc(currentUser.uid).collection("items").doc(productId);
      ref.get().then(d => d.exists ? ref.update({ quantity: d.data().quantity + 1 }) : ref.set({ quantity: 1 }))
        .then(() => window.location.href = "cart.html")
        .catch(e => showToast(e.message));
    }
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
