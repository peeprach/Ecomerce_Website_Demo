<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="order-success.css">

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="success-container">
  <h1>✅ Order Placed Successfully</h1>
  <p class="order-id">Order ID: <span id="order-id">-</span></p>

  <div class="box">
    <h3>📍 Delivery Address</h3>
    <pre id="address">Loading...</pre>
  </div>

  <div class="box">
    <h3>💳 Payment Method</h3>
    <p id="payment">-</p>
  </div>

  <div class="box">
    <h3>💰 Order Summary</h3>
    <p>Shipping: <span id="shipping">-</span></p>
    <p class="total">Total: <span id="total">-</span></p>
  </div>

  <div class="actions">
    <a href="../home.html" class="btn">Go Home</a>
    <a href="../shop.html" class="btn outline">Continue Shopping</a>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCAImX62Ix7bb6TKdAqWVEZv6q3wQ9tDX8",
  authDomain: "mini-ecom-39979.firebaseapp.com",
  projectId: "mini-ecom-39979"
});

const db = firebase.firestore();
const auth = firebase.auth();

const orderId = new URLSearchParams(location.search).get("orderId");
document.getElementById("order-id").innerText = orderId || "-";

auth.onAuthStateChanged(user=>{
  if(!user || !orderId) return;

  // ✅ realtime
  db.collection("orders").doc(orderId).onSnapshot(doc=>{
    if(!doc.exists) return;

    const order = doc.data();

    // ===== Address (รองรับ order เก่า) =====
    const addr = order.address || {};
    const name =
      addr.fullName || addr.fullname || "-";
    const phone =
      addr.phoneno || addr.phone || "-";
    const detail =
      addr.detail || addr.address || "-";

    document.getElementById("address").innerText =
      `${name}\n${detail}\n${phone}`;

    // ===== Payment =====
    document.getElementById("payment").innerText =
      (order.payment || "-").toUpperCase();

    // ===== Summary =====
    document.getElementById("shipping").innerText =
      order.shipping === 0 ? "Free" : `CNY ${order.shipping || 0}`;

    document.getElementById("total").innerText =
      `CNY ${order.total || 0}`;
  });
});
</script>

</body>
</html>
